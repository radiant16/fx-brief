  <style>

    .grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,255,180,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,180,0.03) 1px,transparent 1px);background-size:40px 40px}
    .wrap{max-width:600px;margin:0 auto;padding:20px 14px 48px;position:relative;z-index:1}
    h1{font-size:22px;font-weight:900;letter-spacing:-1px;margin:0 0 2px;background:linear-gradient(135deg,#fff 60%,#00ffb4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

    .fetch-btn{width:100%;padding:13px;background:linear-gradient(135deg,#00ffb4,#00cc90);border:none;border-radius:4px;color:#000;font-family:'Courier New',monospace;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-bottom:14px;box-shadow:0 0 16px rgba(0,255,180,0.25)}

    .summary-card{padding:16px;background:rgba(0,255,180,0.05);border:1px solid rgba(0,255,180,0.2);border-radius:4px;margin-bottom:10px}

    .idx-val{font-size:14px;font-weight:900;margin-bottom:2px}
    .idx-pct{font-size:10px;font-weight:700}

    .footer-copy{text-align:center;font-size:11px;color:#fff;padding-top:4px;letter-spacing:3px;font-weight:600}
    .empty{text-align:center;padding:50px 0;color:#2a2a3a;font-size:12px}

    @supports(padding-top:env(safe-area-inset-top)){.wrap{padding-top:max(20px,env(safe-area-inset-top))}}

const CU="#4ecdc4",CD="#ff6b6b";
function upc(b){return b?CU:CD}
function ic(v){return v==="高"?"#ff4444":v==="中"?"#ffaa00":"#44bb88"}
function dc(d){if(d.includes("ポジティブ")||d.includes("円安要因")||d.includes("上昇"))return CU;if(d.includes("ネガティブ")||d.includes("円高要因")||d.includes("下落"))return CD;return"#888"}
function da(d){if(d.includes("ポジティブ")||d.includes("円安要因")||d.includes("上昇"))return"↑";if(d.includes("ネガティブ")||d.includes("円高要因")||d.includes("下落"))return"↓";return"→"}
function sc(dir){return dir==="上昇"||dir==="円安"?CU:dir==="下落"||dir==="円高"?CD:"#888"}
function sa(dir){return dir==="上昇"||dir==="円安"?"↑":dir==="下落"||dir==="円高"?"↓":"→"}

function rSummary(d){return`<div class="summary-card"><div class="card-lbl">TODAY'S BRIEF</div><div class="card-title">${d.summary}</div><div class="tags"><span class="tag-dir" style="color:${sc(d.direction)}">${sa(d.direction)} ${d.direction}</span><span class="tag-conf">確度: ${d.confidence}</span></div></div>`}
function rNews(news){return news.map(n=>{const imp=ic(n.impact);return`<div class="news-item" style="border-left:3px solid ${imp}"><div class="news-hdr"><div class="news-meta"><span class="news-cat">${n.cat}</span><span class="imp-badge" style="background:${imp}22;color:${imp};border:1px solid ${imp}44">影響${n.impact}</span></div><span class="news-dir" style="color:${dc(n.dir)}">${da(n.dir)} ${n.dir}</span></div><div class="news-title">${n.title}</div><div class="news-detail">${n.detail}</div><span class="news-src">🔗 ${n.src}</span></div>`}).join("")}
function rWatch(w){return`<div class="watch-card"><div class="watch-lbl">⚠ TODAY'S WATCH</div><div class="watch-txt">${w}</div></div>`}
function rIdx(idx){return`<div class="idx-cards">${idx.map(x=>`<div class="idx-card"><div class="idx-name">${x.name}</div><div class="idx-val">${x.value}</div><div class="idx-pct" style="color:${upc(x.up)}">${x.up?"▲":"▼"} ${x.pct}</div></div>`).join("")}</div>`}
function rStocks(stocks){return`<div class="plain">${stocks.map(s=>`<div class="stock-row"><div class="stock-main"><div><div class="stock-name">${s.name}</div><div class="stock-code">${s.code}</div></div><div><div class="stock-val">${s.value}</div><div class="stock-pct" style="color:${upc(s.up)}">${s.up?"▲":"▼"} ${s.pct} <span style="font-size:8px;color:#444">前日比</span></div></div></div>${s.note?`<div class="stock-note">${s.note}</div>`:""}</div>`).join("")}</div>`}

let curPair="USD/JPY";
function renderFX(){
  const r=FX.rates[curPair];const cu=(r.change||"").startsWith("+");
  const pb=Object.keys(FX.rates).map(p=>`<button class="pair-btn${p===curPair?" on":""}" onclick="selPair('${p}',this)">${p}</button>`).join("");
  return rSummary(FX)+`<div class="pair-tabs">${pb}</div><div class="plain" id="rc"><div class="rate-row"><div><div class="rate-lbl">Bid / Ask</div><div class="rate-val">${r.bid} <span class="rate-ask">/ ${r.ask}</span></div></div><div style="text-align:right"><div class="rate-lbl">前日比</div><div class="rate-chg" style="color:${cu?CU:CD}">${cu?"▲":"▼"} ${r.change}</div></div></div><div class="rate-foot"><span>レンジ: ${r.range}</span><span>${r.bias}</span></div></div><div class="sec-lbl">MARKET MOVERS</div>`+rNews(FX.news)+rWatch(FX.watch)
}
function renderJP(){return rSummary(JP)+rIdx(JP.indices)+`<div class="sec-lbl">MARKET MOVERS</div>`+rNews(JP.news)+rWatch(JP.watch)+`<div class="sec-lbl">注目銘柄</div>`+rStocks(JP.stocks)}
function renderUS(){return rSummary(US)+rIdx(US.indices)+`<div class="sec-lbl">MARKET MOVERS</div>`+rNews(US.news)+rWatch(US.watch)+`<div class="sec-lbl">注目銘柄</div>`+rStocks(US.stocks)}
function renderFunds(){
  const fl=FUNDS.list.map(f=>`<div class="fund-row"><div style="flex:1;padding-right:8px"><div class="fund-name">${f.name}</div><div class="fund-nav">基準価額 ${f.nav}</div></div><div class="fund-gain" style="color:${upc(f.up)}">${f.up?"▲":"▼"} ${f.gain}</div></div>`).join("");
  return rSummary(FUNDS)+`<div class="total-card"><div><div style="font-size:9px;color:#555;margin-bottom:2px">合計評価額</div><div style="font-size:18px;font-weight:900">${FUNDS.totalValue}</div></div><div style="text-align:right"><div style="font-size:9px;color:#555;margin-bottom:2px">評価損益</div><div style="font-size:14px;font-weight:700;color:${CU}">▲ ${FUNDS.totalGain}</div></div></div><div class="sec-lbl">MARKET MOVERS</div>`+rNews(FUNDS.news)+rWatch(FUNDS.watch)+`<div class="sec-lbl">保有ファンド一覧</div><div style="padding:8px 10px;background:rgba(255,170,0,0.05);border:1px solid rgba(255,170,0,0.15);border-radius:4px;margin-bottom:8px;font-size:10px;color:#888">⚠ 基準価額は <span style="color:#ffaa00;font-weight:700">2026年4月3日（金）時点</span>。投資信託は翌営業日に確定のため、毎週月曜に更新します。</div><div class="plain">${fl}</div>`
}

const renders={fx:renderFX,jp:renderJP,us:renderUS,funds:renderFunds};
function showPanel(id){
  const btn=document.getElementById("btn-"+id);
  const content=document.getElementById("content-"+id);
  const empty=document.getElementById("empty-"+id);
  btn.disabled=true;btn.textContent="⟳ 取得中...";
  setTimeout(()=>{content.innerHTML=renders[id]();content.style.display="block";empty.style.display="none";btn.disabled=false;btn.textContent="↺ 再表示"},700);
}
function switchTab(id,el){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("on"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.getElementById("panel-"+id).classList.add("on");
  el.classList.add("on");
}
function selPair(pair,btn){
  curPair=pair;
  document.querySelectorAll(".pair-btn").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  const r=FX.rates[pair];const cu=(r.change||"").startsWith("+");
  const rc=document.getElementById("rc");
  if(rc)rc.innerHTML=`<div class="rate-row"><div><div class="rate-lbl">Bid / Ask</div><div class="rate-val">${r.bid} <span class="rate-ask">/ ${r.ask}</span></div></div><div style="text-align:right"><div class="rate-lbl">前日比</div><div class="rate-chg" style="color:${cu?CU:CD}">${cu?"▲":"▼"} ${r.change}</div></div></div><div class="rate-foot"><span>レンジ: ${r.range}</span><span>${r.bias}</span></div>`;
}
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
